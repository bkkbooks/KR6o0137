body:
  text: 西天中印度摩伽陀國那爛陀寺傳教大師三藏賜紫沙門臣法天奉詔譯毗婆尸佛讚惹仁拶反誐捺麌二合龍勇二合反秫囉曩囉路引迦布引𡁠鐙一句訖哩二合播引鉢吒用二合反跛囉呬怛謨引乞叉二合禰泥曳反捨亘二句尾鉢始也二合能上底哩二合婆去嚩武鉢反摩護伽播引囉𭍍三句曩麼引弭鐙蘇上誐哆去誐底孕二合反怛他去引誐怛廕二合反引四句式棄佛讚阿去難上哆播引嚟婆去嚩無可反娑去引誐嚟悉弭二合二句𡫸重呼麼惹拽二合反麼引能去鉢囉二合捨銘引乞史也三合路引亘二合鉢囉二合迦去引始姤引曳曩醯哆去野達轉舌呼謨去引三句曩謨引窣堵二合怛薩昧二合式企引寧𡁠曩引野四句毗舍浮佛讚鑁無滿反尾濕嚩二合部吻無肯反沒鄧一句讚捺囉二合引迦去地揭帝惹仁左反僧去二句娑引誐嚧伽弭嚩引誐引鄧三句倪野二合反禰泥曳反曩尾曩曳曩拶四句俱留孫佛讚野薩拽二合反弩鼻音重呼囉始銘二合短呼鉢囉二合底丁以反昧哩野二合戍引鼻一句囉㘄去引訖哩二合哆引婆去引底丁以反𭌯武鉢反遜馱哩琰二句噢努沫嚩二合囕補澀播二合弭嚩引那部二合鐙三句鐙鑁無滿反禰泥曳反訖囉二合矩㻮捺摩賀引母𩕳寧頂反引捺囕二合引四句迦諾迦牟尼佛讚尾娑去哩拏引尾誐怛沫㘑曩唧怛娑去一句尾囉引𭌜霓以反拏引薩怛怛醯哆去引弩鼻音迦去引哩拏重呼二句喝怛怛謨引尾誐多沫㘑曩曳曩鐙三句蘇上囉引轉舌呼唧鐙揭曩揭母𡫸曩麼引麼野二合引憾四句迦葉波佛讚鉢囉二合怛鉢怛二合左引弭迦囉囉濕銘二合偶引𠻱去一句娑賀娑囉二合素哩野二合引地迦去聲呼禰泥曳反引鉢哆二合帝惹仁左反僧去二句路句引怛懵薩轉舌嚩無可反惹仁左反曩引鼻吻無肯反寧孕二合反三句吻那去引沫野二合反憾迦引捨鉢曩引麼地𠱆四句釋迦牟尼佛讚此讚一首先已到中夏流行出正密三藏新讚集中收録嚩無個反抧野二合反秫惹㘑鉢囉二合底丁以反冒重呼𠆙路引亘一句素哩琰二合引秫惹㘑哩嚩武鉢反鉢那麼二合訕去𧹞二合二句愈𡫸沒哩二合哆入設抧也二合反母𡫸鉢囉二合禰泥曳反鉢三句薩怛二合薩昧二合曩莫播囉麼迦引嚕抳尼整反迦引野設引悉底哩三合引四句當來化主慈氏菩薩讚昧怛㘑二合野曩引麼引覩史哆引攞野薩吐二合一句野薩曳二合反迦去惹曩麼二合引怛哩哆引醯冒重呼地二句嚕怛鉢二合喰入帝囁蘇上誐哆入畢㗚二合體尾琰二合反三句薩轉舌嚩無可反引怛麼二合曩引憾胡敢反鉢囉二合拏妬引濕銘二合怛薩昧二合四句回向結讚一首窣堵二合怛嚩二合引麼野引颯鉢哆二合𡁠曩引曩底丁利反哆曩曩引蘗鐙左引瑟吒二合麼冒重呼地薩怛鑁二合野怛奔去二合抳野二合反𤚥牟敢反娑去儞泥以反怛麼鉢囉二合弭琰𡫸囉引沫野引悉帝二合曩婆去鑁無滿反覩薩怛縛二合引颯鉢哆二合𡁠曩薩怛二合嚩無博反三去麼引鉢哆下字入聲呼二合過去七佛我讚竟未來慈氏次稱揚我所造福利無邊願諸衆生皆解脫
